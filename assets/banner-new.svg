<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="starfieldGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#1a1a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#07071a;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Starfield background -->
  <rect width="1200" height="300" fill="url(#starfieldGradient)" />

  <!-- Scattered stars/dots -->
  <circle cx="120" cy="40" r="1.5" fill="rgba(255,255,255,0.8)" />
  <circle cx="180" cy="70" r="1" fill="rgba(255,255,255,0.6)" />
  <circle cx="250" cy="35" r="1.2" fill="rgba(255,255,255,0.7)" />
  <circle cx="320" cy="85" r="0.8" fill="rgba(255,255,255,0.5)" />
  <circle cx="380" cy="50" r="1" fill="rgba(255,255,255,0.6)" />
  <circle cx="450" cy="100" r="1.3" fill="rgba(255,255,255,0.7)" />
  <circle cx="520" cy="45" r="0.9" fill="rgba(255,255,255,0.6)" />
  <circle cx="600" cy="80" r="1.1" fill="rgba(255,255,255,0.7)" />
  <circle cx="680" cy="40" r="1" fill="rgba(255,255,255,0.6)" />
  <circle cx="750" cy="90" r="1.2" fill="rgba(255,255,255,0.7)" />
  <circle cx="820" cy="50" r="0.8" fill="rgba(255,255,255,0.5)" />
  <circle cx="900" cy="75" r="1.1" fill="rgba(255,255,255,0.6)" />
  <circle cx="1000" cy="35" r="1" fill="rgba(255,255,255,0.7)" />
  <circle cx="1080" cy="85" r="1.3" fill="rgba(255,255,255,0.6)" />
  <circle cx="1150" cy="50" r="0.9" fill="rgba(255,255,255,0.5)" />

  <!-- Left side: name and title -->
  <text x="80" y="100" font-family="Poppins, Arial, sans-serif" font-size="52" font-weight="900" fill="white">
    Mennatullah
  </text>
  <text x="80" y="150" font-family="Poppins, Arial, sans-serif" font-size="52" font-weight="900" fill="white">
    Mohammed Rady
  </text>
  <text x="80" y="190" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" fill="#c084fc">
    Data Engineer
  </text>

  <!-- Right side: circular photo placeholder with gradient ring -->
  <g transform="translate(1050, 150)">
    <!-- Glow effect (soft blur) -->
    <circle cx="0" cy="0" r="85" fill="url(#glowGradient)" opacity="0.3" filter="blur(20)" />
    
    <!-- Gradient ring border -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#glowGradient)" stroke-width="4" />
    
    <!-- Inner circle background for photo -->
    <circle cx="0" cy="0" r="76" fill="#07071a" />
  </g>
</svg>
